apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
  namespace: option1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
        - name: translator
          image: us-central1-docker.pkg.dev/nih-cl-odss-yiqingz2o-65d7/option1/translator@sha256:2df9ec60d76cdbd6da06ef8645f57cb7d8230c4d22f343639ff91051cfadbf92
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: translator-svc
  namespace: option1
spec:
  type: ClusterIP
  selector:
    app: translator
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: translator-hpa
  namespace: option1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: translator
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
